<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>리얼워크 팀효과성 진단 · 액션플랜 워크숍</title>
<meta name="theme-color" content="#191940">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --navy:#191940; --navy2:#2B2B5A;
    --mint:#00CCAA; --mint2:#41D6B6;
    --ink:#14142B; --ink2:#4E4B66;
    --bg:#F6F7FB; --line:#E7E8F0;
    --goal:#445E94; --goal-l:#6C8BB6;
    --structure:#527E7F; --structure-l:#72A9A6;
    --motivation:#584B8E; --motivation-l:#7F6EA9;
    --behavior:#A55154; --behavior-l:#D2797B;
  }
  html,body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,'Helvetica Neue','Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:var(--ink)}
  body{padding-bottom:env(safe-area-inset-bottom)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#cfd3de;border-radius:4px}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;line-height:1}
  .tag-leader{background:#FEF0F3;color:#B13C55;border:1px solid #F6C7D2}
  .tag-all{background:#EEF2FE;color:#3956AA;border:1px solid #C9D3F5}
  .tag-cross{background:#E8F8F3;color:#0E8A6F;border:1px solid #B8E8DA}
  .btn-primary{background:var(--navy);color:#fff}
  .btn-primary:hover{background:#10102E}
  .btn-primary:disabled{background:#A7A9BC;cursor:not-allowed}
  .btn-mint{background:var(--mint);color:#0b2e26}
  .btn-mint:hover{background:var(--mint2)}
  .tpbar{height:6px;border-radius:3px}
  .card-shadow{box-shadow:0 1px 2px rgba(20,20,43,0.05),0 4px 20px rgba(20,20,43,0.05)}
  .card-shadow-lg{box-shadow:0 4px 14px rgba(20,20,43,0.08),0 10px 40px rgba(20,20,43,0.08)}
  .hover-lift{transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease}
  .hover-lift:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(20,20,43,0.1)}
  .card-item{position:relative;transition:transform .15s ease, box-shadow .15s ease, outline-color .15s ease}
  .peer:checked ~ .card-item{outline:2px solid currentColor;outline-offset:-2px;box-shadow:0 10px 28px rgba(20,20,43,.12);border-color:transparent !important}
  .fade-in{animation:fi .18s ease-out}
  @keyframes fi{from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)}}
  /* QR popup + modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(20,20,43,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .modal-body{background:#fff;border-radius:20px;max-width:520px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(20,20,43,.25)}
  .stage-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.02em}
  .stage-forming{background:#EAF0FE;color:#2B417C}
  .stage-performing{background:#E4F5EF;color:#1F6E5A}
  .textlink{color:#2B417C;text-decoration:underline;text-underline-offset:3px}
  .textlink:hover{color:var(--navy)}
  .invisible-render{position:fixed;left:-99999px;top:0;width:1080px;pointer-events:none}
</style>
</head>

<script>

const SUPABASE_URL      = 'https://tjjygdjzhenscahwlbzm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_JtwMJRdHSHoXVKm-nBTNAA_cAvtBo8m';
const ADMIN_PASSWORD    = (typeof window !== 'undefined' && window.__ADMIN_PW) || '';

/* =========================================================================
   DEFAULT_DATA  — 192 cards (16 subtopics x 12)
   ========================================================================= */
const DEFAULT_DATA = {"topics":[{"id":"goal","name":"팀 목표","en":"Team Goal","stage":"Team Forming","color":"#445E94","colorLight":"#6C8BB6","icon":"🎯","subtopics":[{"id":"goal_clarity","name":"팀 목표 명확성","question":"우리 팀에게 주어진 목표는 명확하다.","description":"팀에 부여된 공동 목표의 대표적 속성과 팀 목표의 명확성","cards":[{"id":"goal_clarity_1","actionPlan":"분기 시작 첫 주에 팀원 전원과 함께 2시간 목표 설정 워크숍을 진행하여 OKR을 수립한다.","expectedEffect":"팀 목표가 문서화되어 모든 팀원이 같은 방향을 보게 되고, 개인 업무의 맥락이 명확해진다.","tags":["팀 전체"]},{"id":"goal_clarity_2","actionPlan":"매주 월요일 15분간 팀 목표 진척도를 숫자로 확인하는 체크인 미팅을 고정 운영한다.","expectedEffect":"목표가 일상 업무에 계속 노출되어 팀 전체가 목표를 잊지 않고 실행력을 유지한다.","tags":["팀 전체"]},{"id":"goal_clarity_3","actionPlan":"팀 채널/회의실에 분기 목표를 한 문장으로 상시 게시하고 매달 첫째 주에 리마인드한다.","expectedEffect":"팀 목표가 시각적으로 각인되어 모든 의사결정과 대화의 공통 기준이 된다.","tags":["팀장"]},{"id":"goal_clarity_4","actionPlan":"팀장이 분기마다 팀 미션 선언문(한 문장)을 직접 작성해 첫 회의에서 공유한다.","expectedEffect":"팀의 존재 이유가 선명해져 팀원들이 혼란스러운 상황에서 판단의 기준을 갖게 된다.","tags":["팀장"]},{"id":"goal_clarity_5","actionPlan":"분기 중반 1시간 리뷰에서 현재 목표가 SMART 기준(구체성·측정·달성·연관·기한)에 부합하는지 함께 점검한다.","expectedEffect":"모호한 목표가 조기에 수정되어 연말까지 달성 가능한 목표로 재정립된다.","tags":["팀 전체"]},{"id":"goal_clarity_6","actionPlan":"팀장이 1:1마다 10분간 '우리 팀 목표를 당신 언어로 말해보기' 시간을 갖는다.","expectedEffect":"팀장-팀원 간 목표 해석 격차가 드러나 오해를 조기에 해소할 수 있다.","tags":["팀장"]},{"id":"goal_clarity_7","actionPlan":"분기 초 2시간 워크숍에서 조직 전략 → 팀 목표 → 개인 과업의 연결 지도를 한 장으로 시각화한다.","expectedEffect":"상위 전략과의 연결이 명확해져 팀의 일이 왜 중요한지 모두가 납득하게 된다.","tags":["팀 전체"]},{"id":"goal_clarity_8","actionPlan":"매 분기 첫 회의에서 팀의 North Star Metric(북극성 지표) 1개를 선정해 공유한다.","expectedEffect":"단 하나의 지표로 우선순위 충돌이 줄고 의사결정 속도가 빨라진다.","tags":["팀장"]},{"id":"goal_clarity_9","actionPlan":"분기 초 30분 세션으로 '이번 분기에 하지 않을 일(NOT-TO-DO) 리스트'를 팀 전원이 합의해 작성한다.","expectedEffect":"집중해야 할 일이 선명해지고 업무가 범람하지 않아 목표 달성에 에너지를 쏟을 수 있다.","tags":["팀 전체"]},{"id":"goal_clarity_10","actionPlan":"연말에 1시간 세션으로 '성공한 모습' 기사 형식의 팀 비전 글을 함께 작성한다.","expectedEffect":"목표가 구체적 이미지로 체화되어 팀원이 일의 목적을 감정적으로도 이해하게 된다.","tags":["팀 전체"]},{"id":"goal_clarity_11","actionPlan":"격주 금요일 30분 팀 리추얼로 목표 대비 이번 2주간의 활동을 한 줄씩 자기 정리해 공유한다.","expectedEffect":"본인 업무와 팀 목표의 연결이 습관처럼 점검되어 업무 방향이 어긋나지 않는다.","tags":["팀 전체"]},{"id":"goal_clarity_12","actionPlan":"팀장이 매월 말 15분간 전사 목표 변화·경영진 메시지를 팀에 직접 브리핑한다.","expectedEffect":"상위 변화가 빠르게 전달되어 팀 목표가 환경 변화에 맞게 지속 보정된다.","tags":["팀장"]}]},{"id":"goal_priority","name":"팀 목표 및 우선순위 공유","question":"우리 팀은 팀의 목표와 우선순위를 충실하게 파악하고 있다.","description":"팀 목표와 우선순위에 대한 공유된 이해","cards":[{"id":"goal_priority_1","actionPlan":"분기 초 2시간 워크숍에서 이번 분기 집중할 TOP 3 프로젝트를 공개 합의해 문서화한다.","expectedEffect":"팀 전체가 우선순위에 동의한 상태에서 출발해 자원 배분과 의사결정이 빨라진다.","tags":["팀 전체"]},{"id":"goal_priority_2","actionPlan":"매주 월요일 15분간 팀 우선순위를 정렬·공유하는 세션을 고정 운영한다.","expectedEffect":"주간 단위로 우선순위가 재확인되어 급한 일이 중요한 일을 밀어내는 혼란을 줄인다.","tags":["팀 전체"]},{"id":"goal_priority_3","actionPlan":"신규 업무 요청이 들어올 때마다 RICE/ICE 점수로 객관적으로 평가해 우선순위를 합의한다.","expectedEffect":"주관적 '급함' 대신 데이터 기반으로 우선순위가 결정되어 갈등과 번복이 줄어든다.","tags":["팀 전체"]},{"id":"goal_priority_4","actionPlan":"팀 회의실 화이트보드에 최우선 3장만 포스트잇으로 붙이고 매주 월요일 갱신한다.","expectedEffect":"우선순위가 시각적으로 상시 노출되어 회의 시 우선순위 대화가 자연스럽게 일어난다.","tags":["팀장"]},{"id":"goal_priority_5","actionPlan":"격주 금요일 15분간 '이번 2주간 중단할 업무'를 공개 선언하는 자리를 갖는다.","expectedEffect":"후순위 업무가 명시적으로 종료되어 팀원이 마음 편히 놓을 수 있다.","tags":["팀 전체"]},{"id":"goal_priority_6","actionPlan":"우선순위가 바뀌면 24시간 내 공지채널에 이유·영향·후속 조치를 적어 올리는 규칙을 만든다.","expectedEffect":"변경 맥락이 공유되어 팀원이 혼란 없이 새 우선순위에 적응할 수 있다.","tags":["팀장"]},{"id":"goal_priority_7","actionPlan":"팀장이 매주 월요일 아침 본인의 주간 우선순위와 일정을 팀 채널에 먼저 공개한다.","expectedEffect":"리더의 우선순위가 먼저 보여져 팀원이 자신의 일정을 자연스럽게 정렬한다.","tags":["팀장"]},{"id":"goal_priority_8","actionPlan":"매주 월요일 스탠드업에서 팀원 각자가 '이번 주 내 TOP 3'를 한 줄씩 말한다.","expectedEffect":"리더와 팀원 간 우선순위 인식 차이가 매주 드러나 조기에 정렬할 수 있다.","tags":["팀 전체"]},{"id":"goal_priority_9","actionPlan":"분기 중반에 30분 아이젠하워 매트릭스(긴급·중요) 훈련을 함께 실시한다.","expectedEffect":"우선순위 판단 능력이 팀 공통 언어로 정착되어 팀장이 없어도 올바른 판단을 한다.","tags":["팀 전체"]},{"id":"goal_priority_10","actionPlan":"분기별 'Must Win' 테마 1가지를 정해 팀 모든 리추얼의 기준점으로 활용한다.","expectedEffect":"팀이 '이번 분기에 반드시 이긴다'는 감각으로 결집되어 실행력이 올라간다.","tags":["팀 전체"]},{"id":"goal_priority_11","actionPlan":"월 1회 1시간씩 Stop-doing 세션을 열어 더 이상 가치 없는 업무를 팀 합의로 중단한다.","expectedEffect":"중단 결정이 안전한 문화로 자리잡아 팀의 인지 부하가 지속적으로 낮아진다.","tags":["팀 전체"]},{"id":"goal_priority_12","actionPlan":"팀장이 매달 첫째 주 15분 영상을 제작해 이달의 우선순위 배경과 맥락을 설명한다.","expectedEffect":"비동기 공유가 가능해 일정 어긋나는 팀원도 같은 맥락을 이해하고 일할 수 있다.","tags":["팀장"]}]},{"id":"goal_support","name":"목표 달성을 위한 조직 지원","question":"우리 팀은 회사 안에서 업무일정 수립이나 업무수행에 필요한 모든 정보를 확보할 수 있다.","description":"조직 차원의 지원 및 정보의 충분성과 접근성","cards":[{"id":"goal_support_1","actionPlan":"분기 초 임원 스폰서 1명을 지정해 월 1회 30분 진척·장애물 브리핑을 정례화한다.","expectedEffect":"경영진 차원의 막힘 해소 경로가 생겨 자원·의사결정 병목이 조기에 뚫린다.","tags":["타팀과 함께"]},{"id":"goal_support_2","actionPlan":"월 마지막 주 금요일에 한 장짜리 '진척·장애물·필요 자원' 페이지를 경영진에 제출한다.","expectedEffect":"팀의 실제 상태가 경영진에 투명하게 전달되어 지원 의사결정 속도가 빨라진다.","tags":["타팀과 함께"]},{"id":"goal_support_3","actionPlan":"분기 시작 전 30분간 필요 예산·인력·툴을 체크리스트화해 한 번에 요청한다.","expectedEffect":"산발적인 요청 대신 사전 정리된 지원 요청이 가능해져 승인률이 높아진다.","tags":["팀장"]},{"id":"goal_support_4","actionPlan":"분기 초 1시간 세션으로 팀이 접근해야 하는 데이터·시스템·문서를 매핑하고 누락 권한을 일괄 신청한다.","expectedEffect":"정보 접근 장벽이 낮아져 팀원이 자력으로 필요한 정보를 확보할 수 있다.","tags":["팀 전체"]},{"id":"goal_support_5","actionPlan":"Confluence/Notion에 팀 정보 허브 페이지를 만들고 전원이 주 1회 15분간 문서를 업데이트한다.","expectedEffect":"팀 지식이 한 곳에 축적되어 신규 입사자나 타팀이 팀을 빠르게 이해할 수 있다.","tags":["팀 전체"]},{"id":"goal_support_6","actionPlan":"주간 회의에 'Blocker 로그' 항목을 고정해 막힌 일을 공개 기록하고 상위조직에 공유한다.","expectedEffect":"막힘이 가시화되어 상위조직이 지원해야 할 지점을 명확히 보게 된다.","tags":["타팀과 함께"]},{"id":"goal_support_7","actionPlan":"목표 달성과 관련한 유관부서 담당자들과 격주 30분 협의체를 구성해 정례 운영한다.","expectedEffect":"타부서와 정기 접점이 생겨 정보 공유와 이슈 조기 해결이 가능해진다.","tags":["타팀과 함께"]},{"id":"goal_support_8","actionPlan":"유관부서와 1시간 워크숍으로 Working Agreement(지원 범위·응답 SLA)를 문서화한다.","expectedEffect":"서로의 기대 수준이 합의되어 '왜 지원이 안 되지' 같은 갈등이 줄어든다.","tags":["타팀과 함께"]},{"id":"goal_support_9","actionPlan":"리스크가 30% 이상 커졌을 때 즉시 상위조직에 에스컬레이션하는 기준을 합의해 사내 명시한다.","expectedEffect":"위기가 커지기 전에 대응이 시작되어 프로젝트 실패 확률을 크게 낮춘다.","tags":["타팀과 함께"]},{"id":"goal_support_10","actionPlan":"분기 1회 팀 역량 한계 영역을 선정해 외부 컨설팅·툴 도입을 정식 제안한다.","expectedEffect":"팀 내부 역량 한계가 돌파되어 목표 달성에 필요한 외부 자원이 확보된다.","tags":["타팀과 함께"]},{"id":"goal_support_11","actionPlan":"매주 금요일 15분간 팀원들이 '이번 주 회사에서 얻고 싶었던 지원'을 1줄씩 공유한다.","expectedEffect":"지원 수요가 꾸준히 수집되어 팀장이 다음 주 에스컬레이션 포인트를 명확히 한다.","tags":["팀 전체"]},{"id":"goal_support_12","actionPlan":"분기 1회 타부서 리더와 1:1 커피챗을 진행해 상호 필요사항을 비공식으로 교환한다.","expectedEffect":"공식 채널 외 비공식 정보와 신뢰가 쌓여 긴급 상황에서도 지원을 받을 수 있다.","tags":["타팀과 함께"]}]},{"id":"goal_collab","name":"팀 간 협력 관계","question":"우리 회사에서는 여러 팀이 서로 협력하여 업무를 완수한다.","description":"조직 내 협력 관계와 조직 전반의 협력 풍토","cards":[{"id":"goal_collab_1","actionPlan":"월 1회 인접팀 스탠드업에 팀원 1명이 옵저버로 참석해 회고 내용을 팀에 공유한다.","expectedEffect":"타팀의 상황과 진행 방향이 실시간으로 들어와 협업 단절이 예방된다.","tags":["타팀과 함께"]},{"id":"goal_collab_2","actionPlan":"협업이 중요한 타팀과 분기 초 2시간 워크숍으로 공동 OKR/KPI를 정의한다.","expectedEffect":"두 팀이 같은 지표를 쫓게 되어 책임 전가나 방향 엇갈림이 감소한다.","tags":["타팀과 함께"]},{"id":"goal_collab_3","actionPlan":"협업 프로젝트 시작 시 1시간 내 책임·권한·마감 기준을 명시한 MOU를 문서로 합의한다.","expectedEffect":"갈등 소지가 사전에 제거되어 실행 단계에서 팀 간 마찰이 줄어든다.","tags":["타팀과 함께"]},{"id":"goal_collab_4","actionPlan":"팀 간 마찰이 발생한 직후 30분 비난 없는 포스트모템을 열어 시스템 원인을 찾는다.","expectedEffect":"감정적 앙금 대신 구조적 원인을 찾는 습관이 생겨 반복 갈등이 줄어든다.","tags":["타팀과 함께"]},{"id":"goal_collab_5","actionPlan":"분기 1회 타팀원과 하루 쉐도잉 데이를 진행해 서로의 업무를 직접 체험한다.","expectedEffect":"서로의 맥락과 제약을 체험적으로 이해하게 되어 협업 시 배려심이 커진다.","tags":["타팀과 함께"]},{"id":"goal_collab_6","actionPlan":"월 마지막 주 금요일 타팀의 도움·협업에 감사 메시지를 공개 채널에 남기는 캠페인을 운영한다.","expectedEffect":"협업이 가시화되고 긍정 피드백 루프가 형성되어 타팀과의 관계가 견고해진다.","tags":["타팀과 함께"]},{"id":"goal_collab_7","actionPlan":"30분씩 '우리 팀과 협업하는 법' 온보딩 가이드 페이지를 만들고 요청 시 타팀에 공유한다.","expectedEffect":"신규 협업 상황에서 기본 규칙을 다시 설명하는 시간이 줄어 협업이 빨라진다.","tags":["타팀과 함께"]},{"id":"goal_collab_8","actionPlan":"공동 프로젝트 종료 직후 1시간 합동 회고를 열어 성공과 배움을 함께 축하한다.","expectedEffect":"두 팀의 일체감이 형성되어 다음 협업 프로젝트의 심리적 진입 장벽이 낮아진다.","tags":["타팀과 함께"]},{"id":"goal_collab_9","actionPlan":"팀장이 핵심 협업 팀장들과 매월 1회 30분 1:1을 고정해 작은 이슈를 선제 해소한다.","expectedEffect":"리더 간 신뢰가 쌓여 사소한 마찰이 큰 충돌로 번지지 않는다.","tags":["타팀과 함께"]},{"id":"goal_collab_10","actionPlan":"월 말 기준으로 타팀과 합의한 협업 지표(응답속도·SLA 준수율)를 공개 스코어보드에 올린다.","expectedEffect":"협업 약속이 숫자로 투명해져 양측이 자발적으로 협력 수준을 개선하게 된다.","tags":["타팀과 함께"]},{"id":"goal_collab_11","actionPlan":"분기 초 1시간 협업 예상 매트릭스를 작성해 어느 팀·언제·무엇을 주고받을지 선언한다.","expectedEffect":"팀 간 병목이 예측되어 자원을 미리 조율하고 서로의 일정을 침해하지 않는다.","tags":["타팀과 함께"]},{"id":"goal_collab_12","actionPlan":"타팀원 1명을 분기 1회 팀 회의에 게스트로 초대해 자팀 업무를 소개받는 시간을 갖는다.","expectedEffect":"비공식 네트워크가 넓어지고 '우리 회사는 한 팀'이라는 감각이 강화된다.","tags":["타팀과 함께"]}]}]},{"id":"structure","name":"팀 구조","en":"Team Structure","stage":"Team Forming","color":"#527E7F","colorLight":"#72A9A6","icon":"🧩","subtopics":[{"id":"role_clarity","name":"역할과 책임 명확성","question":"우리 팀은 팀 전체 목표 달성을 위한 개인별 역할과 책임이 명확하다.","description":"팀 목표와 팀원 개인에게 부여된 역할 간의 관련성, 역할과 책임의 명확성","cards":[{"id":"role_clarity_1","actionPlan":"분기 초 2시간 워크숍에서 팀원별 R&R 매트릭스를 함께 작성하고 전원 서명한다.","expectedEffect":"모호한 업무 경계가 사전에 합의되어 '누구 일인지 모르겠다'는 혼란이 사라진다.","tags":["팀 전체"]},{"id":"role_clarity_2","actionPlan":"주요 프로젝트마다 시작 1시간 내 RACI 차트(책임·실무·자문·정보)를 공유 문서에 정리한다.","expectedEffect":"의사결정 권한이 사전에 드러나 실행 지연과 중복 작업이 감소한다.","tags":["팀 전체"]},{"id":"role_clarity_3","actionPlan":"분기마다 30분 Job Description 리프레시 세션으로 현재 업무와 JD를 재정렬한다.","expectedEffect":"업무가 자연스럽게 바뀌어도 JD가 따라가게 되어 업무 정체성 혼란이 줄어든다.","tags":["팀 전체"]},{"id":"role_clarity_4","actionPlan":"매월 첫째 주 1:1에서 팀장이 15분간 '당신에게 기대하는 이번 달 핵심 3가지'를 명시적으로 전달한다.","expectedEffect":"기대치 불일치가 조기에 해소되어 팀원이 자신감 있게 업무에 집중할 수 있다.","tags":["팀장"]},{"id":"role_clarity_5","actionPlan":"팀 간 모호한 업무는 발생 즉시 30분 내 Decision Maker 1인을 선지정해 합의 기록으로 남긴다.","expectedEffect":"경계 업무의 결정이 빨라져 일이 멈추지 않고 진행된다.","tags":["타팀과 함께"]},{"id":"role_clarity_6","actionPlan":"분기 중반 1시간 역할 중복 해소 워크숍에서 포스트잇으로 겹치는 업무를 꺼내놓고 조정한다.","expectedEffect":"중복 업무가 투명해져 비효율이 제거되고 팀원 모두가 고유 기여를 느낀다.","tags":["팀 전체"]},{"id":"role_clarity_7","actionPlan":"핵심 업무마다 1차·2차 담당자(Backup)를 지정해 팀 공유 문서에 명시한다.","expectedEffect":"팀원 부재 시 공백이 없어져 팀 전체의 안정성이 크게 올라간다.","tags":["팀장"]},{"id":"role_clarity_8","actionPlan":"업무별 결정권 수준(리더·팀원·합의)을 매트릭스로 작성해 월 1회 공개 채널에 공유한다.","expectedEffect":"누가 무엇을 결정할 수 있는지 명확해져 불필요한 리더 확인이 줄어든다.","tags":["팀장"]},{"id":"role_clarity_9","actionPlan":"신규 업무 배정 시 15분 내 배정 기준(역량·여유·학습기회)을 명시해 합의한다.","expectedEffect":"업무가 공정하게 분배되어 특정 인물에게 몰림·소외 문제가 예방된다.","tags":["팀 전체"]},{"id":"role_clarity_10","actionPlan":"월 1회 팀 회의 시작에 팀원 각자 30초 '나의 강점·기여 포인트'를 공유한다.","expectedEffect":"팀원의 고유 강점이 팀에 각인되어 협업 시 맞춤형 요청이 가능해진다.","tags":["팀 전체"]},{"id":"role_clarity_11","actionPlan":"분기 초 1시간 세션으로 팀원별 '핵심 기여 영역 1개'를 선언하고 달성 지표를 합의한다.","expectedEffect":"팀원이 자기 성과의 성공 기준을 스스로 갖게 되어 주도성이 커진다.","tags":["팀 전체"]},{"id":"role_clarity_12","actionPlan":"팀에 합류한 신규 팀원이 입사 2주 내 본인 R&R을 한 장으로 정리해 팀에 발표한다.","expectedEffect":"신규 입사자 역할이 빠르게 정착되어 기존 팀원과의 마찰이 줄어든다.","tags":["팀 전체"]}]},{"id":"eval_clarity","name":"평가기준 명확성","question":"우리 팀원들은 팀장이 어떤 기준으로 업무수행 수준을 평가하는지 잘 알고 있다.","description":"팀 업무 수행과 연관된 평가기준의 명확성","cards":[{"id":"eval_clarity_1","actionPlan":"분기 초 1시간 세션으로 평가 기준과 비중을 팀원과 합의해 문서화한다.","expectedEffect":"평가가 투명해져 '왜 이런 평가를 받았는지' 같은 사후 논쟁이 감소한다.","tags":["팀 전체"]},{"id":"eval_clarity_2","actionPlan":"'우수·보통·미흡' 등급의 실제 산출물 예시를 팀 위키에 공개 등록한다.","expectedEffect":"기대치가 구체적으로 시각화되어 팀원이 자기 결과물을 스스로 평가할 수 있다.","tags":["팀장"]},{"id":"eval_clarity_3","actionPlan":"주요 산출물마다 30분 내 품질 체크리스트를 합의해 리뷰 때 동일 기준으로 적용한다.","expectedEffect":"주관적 판단 대신 공통 기준으로 리뷰가 진행되어 피드백 품질이 일관된다.","tags":["팀 전체"]},{"id":"eval_clarity_4","actionPlan":"평가 설계 시 정량(결과)·정성(기여)을 2축으로 분리해 팀에 공유한다.","expectedEffect":"성실하게 일한 사람이 정당하게 평가받아 단기 성과 중심 왜곡이 줄어든다.","tags":["팀장"]},{"id":"eval_clarity_5","actionPlan":"분기 중반 30분 중간 평가 리캘리브레이션 세션을 공식화해 기준을 재조정한다.","expectedEffect":"연말 서프라이즈가 없어지고 팀원이 진행 중 방향을 수정할 기회가 생긴다.","tags":["팀 전체"]},{"id":"eval_clarity_6","actionPlan":"평가 시즌 2주 전 공통 셀프 리뷰 양식을 팀에 배포한다.","expectedEffect":"팀원이 본인 기여를 정리할 준비 시간이 확보되어 평가 대화가 깊어진다.","tags":["팀장"]},{"id":"eval_clarity_7","actionPlan":"월 1회 1:1에서 평소 피드백이 평가에 어떻게 반영될지 10분간 명시적으로 설명한다.","expectedEffect":"피드백과 평가의 연결이 보여져 일상 피드백의 신뢰도가 높아진다.","tags":["팀장"]},{"id":"eval_clarity_8","actionPlan":"평가 관련 타임라인(마감·피드백·1:1)을 분기 초 공유 캘린더에 등록한다.","expectedEffect":"평가 준비가 체계화되어 마감 직전 허둥지둥하는 상황이 사라진다.","tags":["팀장"]},{"id":"eval_clarity_9","actionPlan":"연 1회 360도 피어 리뷰를 실험적으로 도입해 다각도 평가를 시도한다.","expectedEffect":"팀장 시야 밖의 기여가 드러나 공정성에 대한 팀원 신뢰가 강화된다.","tags":["팀 전체"]},{"id":"eval_clarity_10","actionPlan":"'임팩트·기여·리더십' 등 평가 용어를 정의한 용어집을 30분 세션으로 작성해 배포한다.","expectedEffect":"평가 언어가 통일되어 동일 단어를 다르게 해석하는 오해가 줄어든다.","tags":["팀 전체"]},{"id":"eval_clarity_11","actionPlan":"매월 1회 15분 '이번 달 평가 관점' 영상 메시지를 팀장이 녹화해 공유한다.","expectedEffect":"평가 기준의 최신 버전이 계속 업데이트되어 기대치 변경이 투명해진다.","tags":["팀장"]},{"id":"eval_clarity_12","actionPlan":"분기 말 1시간 세션으로 팀원이 '자기 평가서'를 작성해 팀장과 함께 리뷰한다.","expectedEffect":"자기 인식과 리더 인식의 차이가 드러나 평가 대화가 학습 기회로 전환된다.","tags":["팀 전체"]}]},{"id":"autonomy","name":"자율성","question":"우리 팀원들은 자신의 업무와 관련한 대부분의 사안을 스스로 결정할 수 있다.","description":"팀원 개인에게 부여된 의사결정 권한과 팀 내 자율성","cards":[{"id":"autonomy_1","actionPlan":"분기 초 1시간 세션으로 금액·범위별 의사결정 위임 기준 매트릭스를 작성해 공식화한다.","expectedEffect":"팀원이 리더 확인 없이 처리 가능한 영역이 명확해져 업무 속도가 빨라진다.","tags":["팀장"]},{"id":"autonomy_2","actionPlan":"분기마다 '리더 허락이 필요한 일' 목록을 30% 줄이는 리뷰 세션을 30분간 운영한다.","expectedEffect":"리더 병목이 지속적으로 해소되어 팀원의 자율 경험이 점진적으로 확대된다.","tags":["팀장"]},{"id":"autonomy_3","actionPlan":"결정 유형을 '허락 필요·의견만 구함·사후 보고' 3단계(3H)로 분류해 월 1회 리뷰한다.","expectedEffect":"의사결정 모드가 명확해져 불필요한 승인 대기가 줄어든다.","tags":["팀장"]},{"id":"autonomy_4","actionPlan":"팀원에게 주당 4시간(20%)을 업무 외 실험·학습·개선에 자율 사용하도록 보장한다.","expectedEffect":"자율 탐색 공간이 확보되어 혁신 아이디어와 학습이 자연스럽게 생긴다.","tags":["팀 전체"]},{"id":"autonomy_5","actionPlan":"월 1회 Discovery Day를 운영해 팀원이 본인 관심 과제를 하루 종일 파고들게 한다.","expectedEffect":"팀원의 호기심과 주도성이 자극되어 업무 몰입도가 상승한다.","tags":["팀 전체"]},{"id":"autonomy_6","actionPlan":"분기 초 팀장이 '실패해도 괜찮은 예산·범위'를 공식 선언한다.","expectedEffect":"작은 실험이 활성화되어 새로운 방식으로 일하는 시도가 늘어난다.","tags":["팀장"]},{"id":"autonomy_7","actionPlan":"매주 월요일 회의에 '방법 자유, 결과 기준 명확' 원칙을 구두로 반복 선언한다.","expectedEffect":"팀원이 수단에 대한 자율을 확신하게 되어 창의적 방법 탐색이 활발해진다.","tags":["팀장"]},{"id":"autonomy_8","actionPlan":"주요 결정마다 30분 내 ADR(Decision Record) 문서를 작성해 팀 위키에 남긴다.","expectedEffect":"결정 맥락이 남아 위임이 안전해지고 비슷한 결정을 빠르게 내릴 수 있다.","tags":["팀 전체"]},{"id":"autonomy_9","actionPlan":"팀원이 가치 없다고 판단한 회의에 불참할 권한을 월 1회 리더가 명시적으로 재확인한다.","expectedEffect":"시간 자율성이 보장되어 실제 생산적 업무에 집중할 수 있는 환경이 조성된다.","tags":["팀장"]},{"id":"autonomy_10","actionPlan":"핵심 영역마다 오너를 1명 지정해 결정권을 공식 위임하고 이를 채널에 공지한다.","expectedEffect":"영역별 책임과 권한이 함께 주어져 주도성이 높은 팀 문화가 만들어진다.","tags":["팀장"]},{"id":"autonomy_11","actionPlan":"매월 1:1에서 10분간 '최근 스스로 결정한 것·리더 확인이 필요했던 것'을 돌아본다.","expectedEffect":"자율성의 실제 경험이 점검되어 위임 수준이 개인별로 맞춤 조정된다.","tags":["팀장"]},{"id":"autonomy_12","actionPlan":"팀장이 출장·휴가 시 명시적으로 2인 대행자에게 결정권을 위임하고 공지한다.","expectedEffect":"리더 부재 시에도 의사결정이 멈추지 않는 구조가 정착된다.","tags":["팀장"]}]},{"id":"teamwork_structure","name":"팀워크 증진구조","question":"우리 팀은 다른 팀원이 가진 정보나 자원을 활용할 수 있는 체계가 있다.","description":"업무수행·업무평가에서의 상호의존성, 팀 내 정보·자원 공유 체계","cards":[{"id":"teamwork_structure_1","actionPlan":"핵심 업무는 2인 페어로 진행하도록 분기 초 업무 배정에 규칙을 넣는다.","expectedEffect":"페어 작업을 통해 지식이 자연스럽게 공유되고 상호의존이 형성된다.","tags":["팀 전체"]},{"id":"teamwork_structure_2","actionPlan":"개인 KPI 외에 팀 공동 KPI를 분기 초 설계해 평가에 반영한다.","expectedEffect":"팀원이 동료 성과에도 관심을 갖게 되어 협업 인센티브가 강화된다.","tags":["팀장"]},{"id":"teamwork_structure_3","actionPlan":"팀 노하우를 축적하는 Wiki를 운영하며 월말에 기여도를 인정·공개한다.","expectedEffect":"암묵적 지식이 조직 자산으로 전환되어 팀 전체 역량이 지속 상승한다.","tags":["팀 전체"]},{"id":"teamwork_structure_4","actionPlan":"주요 산출물은 최소 1명의 다른 팀원이 리뷰하도록 프로세스에 내장한다.","expectedEffect":"크로스 리뷰가 일상이 되어 상호 이해와 품질이 동시에 올라간다.","tags":["팀 전체"]},{"id":"teamwork_structure_5","actionPlan":"분기 1회 1주일간 역할을 돌려 맡는 크로스트레이닝을 공식 운영한다.","expectedEffect":"상호 대체 가능성이 높아져 팀의 리스크 내성과 이해도가 상승한다.","tags":["팀 전체"]},{"id":"teamwork_structure_6","actionPlan":"주요 업무별 Slack 채널 규칙을 분기 초 30분 만에 정비한다.","expectedEffect":"정보가 흐르는 길이 정돈되어 중요한 메시지가 묻히는 문제를 예방한다.","tags":["팀 전체"]},{"id":"teamwork_structure_7","actionPlan":"매일 오전 9시 15분간 스탠드업으로 상호의존 작업을 동기화한다.","expectedEffect":"팀원 간 일의 타이밍이 맞춰져 병목과 재작업이 크게 줄어든다.","tags":["팀 전체"]},{"id":"teamwork_structure_8","actionPlan":"템플릿·체크리스트·샘플을 한 곳에 모은 공유 리소스 카탈로그를 운영한다.","expectedEffect":"반복 작업이 빨라지고 개인에 의존하지 않는 업무 자산이 축적된다.","tags":["팀 전체"]},{"id":"teamwork_structure_9","actionPlan":"모든 회의록·결정 사항을 48시간 내 공개 문서에 공유하는 규칙을 운영한다.","expectedEffect":"회의에 참여하지 못한 사람도 맥락을 따라잡을 수 있어 정보 격차가 줄어든다.","tags":["팀 전체"]},{"id":"teamwork_structure_10","actionPlan":"신규 입사자를 위한 팀 위키 온보딩 코스를 만들고 분기마다 업데이트한다.","expectedEffect":"입사 후 생산성이 빠르게 확보되어 팀 전체 효율이 유지된다.","tags":["팀 전체"]},{"id":"teamwork_structure_11","actionPlan":"월 마지막 주 1시간 '지식 공유 Show & Tell' 세션을 열어 노하우 2건을 공유한다.","expectedEffect":"팀 내 전문성이 분산되어 특정인에게 지식이 고립되는 문제가 해소된다.","tags":["팀 전체"]},{"id":"teamwork_structure_12","actionPlan":"팀장이 매주 15분간 '이번 주 도움 요청 가능한 사람' 매트릭스를 업데이트해 공유한다.","expectedEffect":"누구에게 무엇을 요청할 수 있는지 명확해져 팀원 간 상호 활용이 활성화된다.","tags":["팀장"]}]}]},{"id":"motivation","name":"팀 동기","en":"Team Motivation","stage":"Team Performing","color":"#584B8E","colorLight":"#7F6EA9","icon":"💜","subtopics":[{"id":"cohesion","name":"팀 응집","question":"우리 팀원들은 하나의 팀이 되어 일한다.","description":"팀워크에 대한 향유와 팀 결속, 팀원들의 팀 응집 동기","cards":[{"id":"cohesion_1","actionPlan":"분기 초 1시간 워크숍에서 팀만의 이름·슬로건·상징을 공동 창작한다.","expectedEffect":"팀 정체성이 뚜렷해져 소속감과 자부심이 일상 업무로 확장된다.","tags":["팀 전체"]},{"id":"cohesion_2","actionPlan":"분기 1회 업무 외 시간을 함께 보내는 팀 데이(반나절 이상)를 정기 운영한다.","expectedEffect":"비업무 접점이 생겨 팀원 간 정서적 유대가 깊어진다.","tags":["팀 전체"]},{"id":"cohesion_3","actionPlan":"작은 성공도 금주 내 팀 공개 채널에 축하 메시지로 남기는 규칙을 운영한다.","expectedEffect":"'우리가 해냈다'는 공동 기억이 축적되어 팀의 응집력이 강화된다.","tags":["팀 전체"]},{"id":"cohesion_4","actionPlan":"분기 초 30분씩 팀원이 서로를 1:1로 인터뷰하는 상호 스토리 공유 시간을 갖는다.","expectedEffect":"개인사·동기가 팀에 공유되어 서로에 대한 이해가 깊어진다.","tags":["팀 전체"]},{"id":"cohesion_5","actionPlan":"분기 초 1시간 세션으로 '우리 팀 규칙 선언문'을 공동 작성해 회의실 벽에 게시한다.","expectedEffect":"팀이 지키기로 한 원칙이 공유되어 갈등 상황에서 공통 기준을 갖는다.","tags":["팀 전체"]},{"id":"cohesion_6","actionPlan":"월 1회 30분 체크인 서클로 팀원들이 감정·상태·필요를 돌아가며 공유한다.","expectedEffect":"팀의 감정적 날씨가 투명해져 서로를 배려하는 협업이 가능해진다.","tags":["팀 전체"]},{"id":"cohesion_7","actionPlan":"분기마다 대화 페어를 랜덤으로 바꿔 특정인이 고립되지 않도록 설계한다.","expectedEffect":"소외되는 팀원이 사라지고 전원이 팀에 연결된 감각을 갖는다.","tags":["팀장"]},{"id":"cohesion_8","actionPlan":"팀이 함께 즐길 공동 취미 채널(러닝·독서·영화 등)을 1개 이상 만들어 운영한다.","expectedEffect":"비업무 공감대가 생겨 업무 대화의 심리적 거리도 가까워진다.","tags":["팀 전체"]},{"id":"cohesion_9","actionPlan":"분기 종료 시 1시간 세션으로 팀의 여정을 스토리로 정리해 공동 기억을 만든다.","expectedEffect":"단편적 업무가 의미 있는 내러티브로 연결되어 소속감의 뿌리가 깊어진다.","tags":["팀 전체"]},{"id":"cohesion_10","actionPlan":"팀의 이정표·사건을 타임라인으로 아카이브해 팀 위키에 상시 업데이트한다.","expectedEffect":"팀 역사가 가시화되어 오래 함께한 감각과 신규 입사자 이해를 돕는다.","tags":["팀장"]},{"id":"cohesion_11","actionPlan":"월 1회 팀원 생일·입사 기념일을 팀 채널에서 1분간 축하한다.","expectedEffect":"개인 이벤트가 팀 이벤트로 확장되어 서로가 보살펴지는 감각이 생긴다.","tags":["팀 전체"]},{"id":"cohesion_12","actionPlan":"연 1회 전원이 참여하는 팀 외부 워크숍(1박 2일 또는 하루)을 공식 편성한다.","expectedEffect":"일상에서 벗어난 시간이 관계를 리셋시켜 팀 결속이 새 차원으로 올라간다.","tags":["팀 전체"]}]},{"id":"efficacy","name":"팀 효능감","question":"우리 팀원들은 문제를 해결하기에 충분한 능력을 갖추고 있다.","description":"팀이 가진 능력에 대한 긍정적 평가와 확신","cards":[{"id":"efficacy_1","actionPlan":"매주 월요일 '작은 승리 보드'에 지난 주 성공 사례를 한 줄씩 기록해 시각화한다.","expectedEffect":"'우리는 할 수 있다'는 데이터가 쌓여 팀의 자기효능감이 꾸준히 강화된다.","tags":["팀 전체"]},{"id":"efficacy_2","actionPlan":"월 1회 30분 '어려운 문제 회고' 세션으로 해결한 난제 사례를 함께 리뷰한다.","expectedEffect":"어려움을 이긴 경험이 공유되어 다음 난제에 대한 팀 자신감이 커진다.","tags":["팀 전체"]},{"id":"efficacy_3","actionPlan":"분기마다 한 단계 어려운 Stretch Goal을 의도적으로 1개 도전한다.","expectedEffect":"성공 경험의 난이도가 점진적으로 높아져 팀 역량이 체감적으로 성장한다.","tags":["팀 전체"]},{"id":"efficacy_4","actionPlan":"분기 초 1시간 세션으로 팀이 보유한 스킬·강점을 지도로 그려 공유한다.","expectedEffect":"팀의 집단 역량이 선명해져 '우리가 이걸 할 수 있다'는 인식이 확립된다.","tags":["팀 전체"]},{"id":"efficacy_5","actionPlan":"월 1회 외부 벤치마크 사례를 학습하되 '우리가 이미 잘하고 있는 점'을 먼저 찾는다.","expectedEffect":"비교로 인한 자기 부정 대신 강점 기반 학습이 이뤄져 자신감이 유지된다.","tags":["팀 전체"]},{"id":"efficacy_6","actionPlan":"팀이 성공한 패턴과 방법을 분기마다 문서화해 팀 위키에 반복 무기로 정리한다.","expectedEffect":"성공이 재현 가능해져 팀의 역량이 개인 단위가 아닌 조직 단위로 축적된다.","tags":["팀 전체"]},{"id":"efficacy_7","actionPlan":"매주 팀 회의 마지막 5분간 팀원 1명의 최근 강점 발휘 사례를 공개 인정한다.","expectedEffect":"강점이 가시화되어 팀원이 자기 역량에 대한 긍정적 자기 인식을 갖는다.","tags":["팀장"]},{"id":"efficacy_8","actionPlan":"분기 초 30분씩 팀장이 '나는 우리 팀을 왜 믿는지'를 구체적으로 말하는 시간을 갖는다.","expectedEffect":"리더의 신뢰 표현이 팀 자신감의 앵커가 되어 도전적인 순간에 힘이 된다.","tags":["팀장"]},{"id":"efficacy_9","actionPlan":"연 1회 1시간 세션으로 팀이 과거에 극복한 위기 이야기를 재조명한다.","expectedEffect":"팀의 회복력이 상기되어 새로운 위기 앞에서도 흔들리지 않는다.","tags":["팀 전체"]},{"id":"efficacy_10","actionPlan":"분기 초 1시간 세션으로 팀 전체의 역량 개발 로드맵을 제시해 성장 방향을 가시화한다.","expectedEffect":"'점점 더 강해지고 있다'는 성장 궤적이 보여 자신감이 미래형으로 확장된다.","tags":["팀장"]},{"id":"efficacy_11","actionPlan":"월 1회 타팀/고객으로부터 받은 긍정 피드백을 공식 채널에 공유한다.","expectedEffect":"외부의 인정이 내부 자신감을 강화해 팀 효능감의 증거가 늘어난다.","tags":["타팀과 함께"]},{"id":"efficacy_12","actionPlan":"매 프로젝트 시작 1시간 내 '우리 팀이 이 일을 할 수 있는 이유 5가지'를 함께 적는다.","expectedEffect":"시작 단계의 자기효능감이 올라가 프로젝트 초반 추진력이 강해진다.","tags":["팀 전체"]}]},{"id":"trust","name":"팀 신뢰","question":"우리 팀원들은 서로를 신뢰한다.","description":"대인적 신뢰와 팀원들이 팀 지향적으로 행동할 것이라는 확신과 기대","cards":[{"id":"trust_1","actionPlan":"작은 약속도 24시간 내 문서/채널에 기록하는 '말→기록→지킴' 프로토콜을 운영한다.","expectedEffect":"약속 이행이 가시화되어 신뢰 자본이 꾸준히 축적된다.","tags":["팀 전체"]},{"id":"trust_2","actionPlan":"월 1회 팀장이 먼저 자신의 실수·한계를 공개하는 취약성 리더십 시범을 보인다.","expectedEffect":"리더의 약함 공유가 심리적 안전의 시작이 되어 팀 신뢰가 깊어진다.","tags":["팀장"]},{"id":"trust_3","actionPlan":"1:1 시작 시 1분간 이야기의 공유 범위 원칙을 합의하는 비밀 유지 약속을 한다.","expectedEffect":"대화의 안전성이 확보되어 팀원이 솔직한 이야기를 꺼낼 수 있다.","tags":["팀장"]},{"id":"trust_4","actionPlan":"외부 커뮤니케이션에서 기여자를 반드시 명시하는 공로 표기 규칙을 팀 합의로 만든다.","expectedEffect":"각자의 공로가 공정하게 드러나 서로에 대한 신뢰가 단단해진다.","tags":["팀 전체"]},{"id":"trust_5","actionPlan":"'누군가의 이야기는 본인 앞에서만' 원칙을 팀 규칙으로 선언하고 회의실에 게시한다.","expectedEffect":"뒤에서 말하기가 사라져 팀 내 신뢰가 실질적으로 지켜진다.","tags":["팀 전체"]},{"id":"trust_6","actionPlan":"매 회의에서 의심 상황 발생 시 먼저 의도를 묻는 Assume Positive Intent 훈련을 한다.","expectedEffect":"성급한 판단 대신 맥락 탐색 습관이 생겨 갈등이 신뢰로 전환된다.","tags":["팀 전체"]},{"id":"trust_7","actionPlan":"갈등 발생 시 1:1 → 리더 조정 → 팀 회고의 3단계 해소 프로세스를 미리 합의한다.","expectedEffect":"갈등 처리 방식이 예측 가능해져 갈등이 두렵지 않은 팀 문화가 만들어진다.","tags":["팀 전체"]},{"id":"trust_8","actionPlan":"분기 1회 10분 '팀 신뢰 온도' 설문(5점 척도)을 실시해 결과를 공유한다.","expectedEffect":"신뢰 수준이 측정되어 저하 시점을 조기에 발견하고 대응할 수 있다.","tags":["팀장"]},{"id":"trust_9","actionPlan":"팀장이 한 약속을 공개 문서에 기록하고 월 1회 이행률을 공유한다.","expectedEffect":"리더의 투명성이 모델링되어 팀 전체의 약속 문화가 만들어진다.","tags":["팀장"]},{"id":"trust_10","actionPlan":"월 마지막 주 금요일 팀원들이 동료 한 명에게 감사 메모를 쓰는 릴레이를 운영한다.","expectedEffect":"감사 표현이 일상화되어 팀 내 정서적 신뢰 자본이 꾸준히 증가한다.","tags":["팀 전체"]},{"id":"trust_11","actionPlan":"분기 초 30분간 각자의 'Trust-Breaker(신뢰를 깨는 행동) 3가지'를 공유한다.","expectedEffect":"서로의 예민한 지점이 사전에 알려져 의도치 않은 신뢰 훼손을 예방한다.","tags":["팀 전체"]},{"id":"trust_12","actionPlan":"팀장이 1:1 마지막 5분을 '당신에게 내가 지킬 약속 1가지'로 마무리한다.","expectedEffect":"구체적 약속과 이행이 반복되어 리더-팀원 간 신뢰 토대가 강해진다.","tags":["팀장"]}]},{"id":"psych_safety","name":"팀 심리적 안전감","question":"우리 팀에서는 누군가 실수해도 그 사람을 비난하지 않는다.","description":"팀 전반의 심리적 안전 풍토, 실수 용인, 어려운 문제 제기, 서로 다름의 수용","cards":[{"id":"psych_safety_1","actionPlan":"월 1회 30분 '이번 달 내가 잘못한 것' 공유 세션을 팀장이 먼저 열어 진행한다.","expectedEffect":"실패가 안전하게 드러나 학습 자산이 되고 비난 대신 개선이 일어난다.","tags":["팀 전체"]},{"id":"psych_safety_2","actionPlan":"사고·실수 발생 시 1시간 내 블레임리스 포스트모템을 열어 시스템 원인을 찾는다.","expectedEffect":"개인 비난 대신 구조적 원인 탐색이 기본값이 되어 반복 실패가 줄어든다.","tags":["팀 전체"]},{"id":"psych_safety_3","actionPlan":"주요 의사결정마다 Disagree & Commit 원칙을 적용해 이견을 충분히 듣고 결정 후 실행한다.","expectedEffect":"반대 의견이 말해질 공간이 생겨 정보 손실과 뒷담화가 동시에 줄어든다.","tags":["팀 전체"]},{"id":"psych_safety_4","actionPlan":"모든 회의에서 발언 기회를 돌려주는 라운드로빈 방식을 5분씩 운영한다.","expectedEffect":"목소리 큰 사람 중심이 아닌 전원 참여형 논의가 가능해진다.","tags":["팀장"]},{"id":"psych_safety_5","actionPlan":"'이대로 가면 안 됩니다' 발언을 자유롭게 할 수 있는 Red-Flag 문화를 분기 초 선언한다.","expectedEffect":"위험 신호가 조기에 수면 위로 올라와 큰 실패를 사전에 방지할 수 있다.","tags":["팀장"]},{"id":"psych_safety_6","actionPlan":"팀장이 회의에서 주 1회 이상 '나도 모른다' 또는 '내가 틀렸다'를 의도적으로 말한다.","expectedEffect":"리더의 완벽주의가 해체되어 팀원도 모름과 실수를 편하게 표현할 수 있다.","tags":["팀장"]},{"id":"psych_safety_7","actionPlan":"월 말 '이달의 좋은 질문' 3건을 선정해 공개 인정과 작은 포상을 한다.","expectedEffect":"질문하는 행동이 강화되어 침묵으로 묻히는 문제가 줄어든다.","tags":["팀장"]},{"id":"psych_safety_8","actionPlan":"분기 1회 10분 익명 피드백 설문을 실시해 말하지 못한 이슈를 수면 위로 올린다.","expectedEffect":"실명 환경에서 못 한 이야기가 드러나 현실 문제 해결이 시작된다.","tags":["팀장"]},{"id":"psych_safety_9","actionPlan":"월 1회 30분 '불편한 주제 세션'을 열어 정면으로 다루기 어려운 주제를 논의한다.","expectedEffect":"어려운 주제가 공식 회의 테이블에 올라와 곪은 이슈가 해소된다.","tags":["팀 전체"]},{"id":"psych_safety_10","actionPlan":"용기 내 어려운 이야기를 꺼낸 팀원을 회의 마지막에 공개적으로 인정한다.","expectedEffect":"어려운 발언의 가치가 모델링되어 다음에 더 많은 발언이 나올 수 있다.","tags":["팀장"]},{"id":"psych_safety_11","actionPlan":"분기 초 1시간 세션으로 팀원 각자의 다양성(배경·스타일·관점)을 공유·기록한다.","expectedEffect":"서로의 다름이 가시화되어 '왜 저렇게 말할까' 같은 해석 오류가 줄어든다.","tags":["팀 전체"]},{"id":"psych_safety_12","actionPlan":"매주 월요일 회의 시작 3분간 '이번 주 컨디션 1-5' 체크인을 전원 실시한다.","expectedEffect":"감정적 상태가 공유되어 서로를 배려하는 심리적 안전 분위기가 일상화된다.","tags":["팀 전체"]}]},{"id":"learning","name":"팀 학습지향","question":"우리 팀원들은 새로운 지식과 능력을 습득하기 위한 기회를 탐색한다.","description":"팀 전반의 학습 풍토, 능력개발 기회의 탐색과 활용","cards":[{"id":"learning_1","actionPlan":"주 2시간을 '학습 시간'으로 팀 공유 캘린더에 블록해 업무 요청으로 깨지지 않게 보호한다.","expectedEffect":"학습이 의무가 아닌 실제 시간으로 확보되어 성장이 지속 가능해진다.","tags":["팀장"]},{"id":"learning_2","actionPlan":"격주 금요일 1시간 북클럽·아티클 클럽을 운영해 공통 학습 주제를 다룬다.","expectedEffect":"팀 공통 지식 자산이 축적되어 업무 대화의 깊이가 상승한다.","tags":["팀 전체"]},{"id":"learning_3","actionPlan":"월 1회 30분 '내부 티치백' 세션에서 팀원이 학습한 내용을 팀에 가르친다.","expectedEffect":"가르침을 통한 심화 학습이 일어나고 지식이 팀 단위로 공유된다.","tags":["팀 전체"]},{"id":"learning_4","actionPlan":"분기 1회 외부 콘퍼런스·세미나 참여를 보장하고 다음 주 내 30분 후기 공유를 의무화한다.","expectedEffect":"외부 지식이 내부로 흡수되어 팀이 환경 변화에 지속 노출된다.","tags":["팀 전체"]},{"id":"learning_5","actionPlan":"프로젝트 종료 직후 1시간 회고에서 '1가지 핵심 배움 function hasSupabase(){ return !!(SUPABASE_URL && SUPABASE_ANON_KEY); }
async function sbFetch(path, opts={}){
  if(!hasSupabase()) throw new Error('Supabase not configured');
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers||{}),
    }
  });
  if(!res.ok) throw new Error('Supabase ' + res.status + ': ' + await res.text());
  const txt = await res.text();
  try { return txt ? JSON.parse(txt) : null; } catch(e){ return null; }
}

/* --- cards ---------------------------------------------------------------- */
function flattenCards(data){
  const rows = [];
  data.topics.forEach(t=>{
    t.subtopics.forEach(s=>{
      s.cards.forEach((c,idx)=>{
        rows.push({
          card_id: c.id,
          topic_id: t.id,
          subtopic_id: s.id,
          action_plan: c.actionPlan,
          expected_effect: c.expectedEffect,
          tags: c.tags || [],
          order_index: idx,
        });
      });
    });
  });
  return rows;
}
function unflattenCards(rows, baseData){
  // clone baseData and replace cards based on rows
  const data = JSON.parse(JSON.stringify(baseData));
  const lookup = {};
  rows.forEach(r=>{
    lookup[r.subtopic_id] = lookup[r.subtopic_id] || [];
    lookup[r.subtopic_id].push(r);
  });
  data.topics.forEach(t=>{
    t.subtopics.forEach(s=>{
      if(lookup[s.id]){
        const sorted = [...lookup[s.id]].sort((a,b)=>a.order_index-b.order_index);
        s.cards = sorted.map(r=>({
          id: r.card_id,
          actionPlan: r.action_plan,
          expectedEffect: r.expected_effect,
          tags: r.tags || [],
        }));
      }
    });
  });
  return data;
}

  if(hasSupabase()){
    try {
      const rows = await sbFetch('action_plans?select=*&order=subtopic_id,order_index');
      if(rows && rows.length){
        const data = unflattenCards(rows, DEFAULT_DATA);
        localStorage.setItem(LS_KEYS.cards, JSON.stringify(data));
        return data;
      }
    } catch(e){ console.warn('supabase load failed, falling back to cache', e); }
  }
  // Offline / not configured — use localStorage cache if available
  const cached = localStorage.getItem(LS_KEYS.cards);
  if(cached){
    try {
      const parsed = JSON.parse(cached);
      if(parsed && parsed.topics && parsed.topics.length===4) return parsed;
    } catch(e){}
  }
  return DEFAULT_DATA;
}
function saveDataLocal(data){ localStorage.setItem(LS_KEYS.cards, JSON.stringify(data)); }
async function saveCardsToSupabase(data){
  if(!hasSupabase()) return {ok:false, reason:'not-configured'};
  const rows = flattenCards(data);
  // upsert
  try{
    await sbFetch('action_plans?on_conflict=card_id', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify(rows),
    });
    return {ok:true, count:rows.length};
  }catch(e){ return {ok:false, reason:String(e)}; }
}

/* --- selections ----------------------------------------------------------- */
async function submitSelection(payload){
  const full = { ...payload, created_at: new Date().toISOString() };
  // local
  const list = (()=>{ try{return JSON.parse(localStorage.getItem(LS_KEYS.selections)||'[]');}catch(e){return [];} })();
  list.push(full);
  localStorage.setItem(LS_KEYS.selections, JSON.stringify(list));
  // supabase
  if(hasSupabase()){
    try {
      await sbFetch('selections', {
        method:'POST',
        headers:{'Prefer':'return=minimal'},
        body: JSON.stringify([full]),
      });
    } catch(e){ console.warn('supabase insert selection failed', e); }
  }
}

   ROUTER
   ========================================================================= */
const route = {
  path: 'home', params: {}, query: {},
};
function parseHash(){
  const raw = location.hash.replace(/^#\/?/, '');
  const [rawPath, rawQuery] = raw.split('?');
  const seg = rawPath.split('/').filter(Boolean);
  const query = {};
  (rawQuery||'').split('&').filter(Boolean).forEach(kv=>{
    const [k,v] = kv.split('=');
    query[decodeURIComponent(k)] = decodeURIComponent(v||'');
  });
  // Also include regular ?query from URL
  new URLSearchParams(location.search).forEach((v,k)=>{ if(!(k in query)) query[k]=v; });
  if(seg.length===0) return {path:'home', params:{}, query};
  if(seg[0]==='sub' && seg[1])    return {path:'sub', params:{subId:seg[1]}, query};
  if(seg[0]==='result' && seg[1]) return {path:'result', params:{subId:seg[1]}, query};
  if(seg[0]==='admin')            return {path:'admin', params:{}, query};
  return {path:'home', params:{}, query};
}

window.addEventListener('popstate', render);

function go(path){ location.hash = path; }

/* Subtopic flat lookup */
function getTopic(id){ return DATA.topics.find(t=>t.id===id); }
function getSub(id){
  for(const t of DATA.topics){ for(const s of t.subtopics){ if(s.id===id) return {topic:t, sub:s}; } }
  return null;
}
function getCard(subId, cardId){
  const hit = getSub(subId); if(!hit) return null;
  return hit.sub.cards.find(c=>c.id===cardId);
}

async function boot(){
  DATA = await loadData();
  render();
}

function render(){
  Object.assign(route, parseHash());
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(route.path==='home')   return renderHome(app);
  if(route.path==='sub')    return renderSubtopic(app, route.params.subId);
  if(route.path==='result') return renderResult(app, route.params.subId);
  if(route.path==='admin')  return renderAdmin(app);
}

window.onCardToggle = function(el, topicId){
  if(el.checked){
    if(selectedCardIds.length>=3){ el.checked = false; toast('3개까지만 선택할 수 있어요'); return; }
    selectedCardIds.push(el.value);
  } else {
    selectedCardIds = selectedCardIds.filter(x=>x!==el.value);
  }
  document.getElementById('pick-label').textContent = selectedCardIds.length;
  document.getElementById('select-count').textContent = selectedCardIds.length + ' / 3';
  document.getElementById('next-btn').disabled = selectedCardIds.length!==3;
};

window.onSubtopicNext = async function(subId){
  if(selectedCardIds.length!==3) return;
  const hit = getSub(subId);
  await submitSelection({
    topic_id: hit.topic.id,
    subtopic_id: subId,
    card_ids: selectedCardIds,
  });
  sessionStorage.setItem('last_pick_'+subId, JSON.stringify(selectedCardIds));
  go('/result/'+subId);
};

function findCardIdx(subId, cardId){
  for(const t of DATA.topics){
    for(const s of t.subtopics){
      if(s.id===subId){
        const i = s.cards.findIndex(c=>c.id===cardId);
        return {sub:s, idx:i};
      }
    }
  }
  return null;
}
window.updateCardField = function(subId, cardId, field, val){
  const hit = findCardIdx(subId, cardId);
  if(!hit || hit.idx<0) return;
  hit.sub.cards[hit.idx][field] = val;
  saveDataLocal(DATA);
};
window.toggleCardTag = function(subId, cardId, tag){
  const hit = findCardIdx(subId, cardId);
  if(!hit || hit.idx<0) return;
  const c = hit.sub.cards[hit.idx];
  c.tags = c.tags || [];
  const i = c.tags.indexOf(tag);
  if(i>=0) c.tags.splice(i,1); else c.tags.push(tag);
  saveDataLocal(DATA);
  adminRenderTab();
};
window.moveCard = function(subId, cardId, dir){
  const hit = findCardIdx(subId, cardId);
  if(!hit || hit.idx<0) return;
  const arr = hit.sub.cards;
  const ni = hit.idx + dir;
  if(ni<0 || ni>=arr.length) return;
  const tmp = arr[ni]; arr[ni] = arr[hit.idx]; arr[hit.idx] = tmp;
  saveDataLocal(DATA);
  adminRenderTab();
};
window.deleteCard = function(subId, cardId){
  if(!confirm('이 카드를 삭제할까요?')) return;
  const hit = findCardIdx(subId, cardId);
  if(!hit || hit.idx<0) return;
  hit.sub.cards.splice(hit.idx,1);
  saveDataLocal(DATA);
  adminRenderTab();
};
window.addCard = function(subId){
  const hit = findCardIdx(subId, '__new__'); // trick; get sub from DATA
  const sub = (()=>{ for(const t of DATA.topics) for(const s of t.subtopics) if(s.id===subId) return s; return null; })();
  if(!sub) return;
  const n = sub.cards.length + 1;
  const id = subId + '_' + n + '_' + Math.random().toString(36).slice(2,6);
  sub.cards.push({id, actionPlan:'새 액션플랜', expectedEffect:'기대효과를 적어주세요', tags:['팀 전체']});
  saveDataLocal(DATA);
  adminRenderTab();
};

      </label>

  </div>`;

window.downloadExcelTemplate = function(){
  const rows = [];
  DATA.topics.forEach(t=>t.subtopics.forEach(s=>s.cards.forEach((c,idx)=>{
    rows.push({
      topic_id: t.id,
      topic_name: t.name,
      subtopic_id: s.id,
      subtopic_name: s.name,
      question: s.question || '',
      card_id: c.id,
      order_index: idx+1,
      actionPlan: c.actionPlan,
      expectedEffect: c.expectedEffect,
      tags: (c.tags||[]).join(', '),
    });
  })));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'action_plans');
  XLSX.writeFile(wb, 'action-plans-template.xlsx');
};
window.handleExcelUpload = function(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);
      let count = 0;
      rows.forEach(r=>{
        const hit = findCardIdx(r.subtopic_id, r.card_id);
        if(hit && hit.idx>=0){
          const c = hit.sub.cards[hit.idx];
          if(r.actionPlan) c.actionPlan = String(r.actionPlan);
          if(r.expectedEffect) c.expectedEffect = String(r.expectedEffect);
          if(r.tags!==undefined){
            c.tags = String(r.tags||'').split(',').map(x=>x.trim()).filter(Boolean);
          }
          if(r.order_index){ /* order handled after */ }
          count++;
        }
      });
      // re-sort each subtopic by order_index if provided
      const orderMap = {};
      rows.forEach(r=>{ if(r.card_id && r.order_index){ orderMap[r.card_id] = r.order_index; } });
      DATA.topics.forEach(t=>t.subtopics.forEach(s=>{
        s.cards.sort((a,b)=>(orderMap[a.id]||0)-(orderMap[b.id]||0));
      }));
      saveDataLocal(DATA);
      adminRenderTab();
      document.getElementById('bulk-status').innerHTML = `<span class="text-[var(--mint)] font-bold">✓ ${count}건 반영 완료</span>`;
    } catch(err){
      document.getElementById('bulk-status').innerHTML = '<span class="text-red-600">업로드 실패: '+escapeHtml(err.message)+'</span>';
    }
  };
  reader.readAsArrayBuffer(file);
};

window.downloadQRFrom = async function(url){
  const dataURL = await makeQRDataURL(url, 800);
  const a = document.createElement('a'); a.download='qr.png'; a.href=dataURL; a.click();
};
async function makeQRDataURL(url, size){
  return new Promise(resolve=>{
    const div = document.createElement('div');
    div.style.position='fixed'; div.style.left='-9999px';
    document.body.appendChild(div);
    new QRCode(div, {text:url, width:size, height:size, colorDark:'#191940', colorLight:'#ffffff', correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{
      const canvas = div.querySelector('canvas');
      const img = div.querySelector('img');
      if(canvas){ resolve(canvas.toDataURL('image/png')); }
      else if(img){ resolve(img.src); }
      else { resolve(''); }
      div.remove();
    }, 120);
  });
}

function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#191940;color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;z-index:99;box-shadow:0 6px 20px rgba(20,20,43,.2)';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}
